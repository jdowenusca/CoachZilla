<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Create Account</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container">

        <!-- Logo -->
        <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo">
        <h1>CoachZilla</h1>

        <!-- Create Account Box -->
        <div class="login-box">
            <h2>Create Account</h2>

            <input type="text" id="newUsername" placeholder="Username" maxlength="15">
            <input type="password" id="newPassword" placeholder="Password">
            <input type="text" id="newFirstName" placeholder="First Name" maxlength="15">
            <input type="text" id="newLastName" placeholder="Last Name" maxlength="15">

            <div class="button-group">
                <button id="createBtn">Create Account</button>
                <button id="backToLoginBtn">Back</button>
            </div>

            <p id="createMessage" class="form-message"></p>
        </div>

    </div>

    <script type="module" src="../js/pages/createPage.js"></script>
</body>

</html>
