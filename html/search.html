<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Search Routes</title>

    <link rel="stylesheet" href="../css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>

<body>
    <div class="search-page-wrapper">
        <header class="search-header">
            <!-- Logo -->
            <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo">
            <h1>CoachZilla</h1>
        </header>

        <div class="search-header-actions">
            <div class="button-group">
                <button id="backHomeBtn" type="button">Home</button>
                <button id="goTravelBtn" type="button">Travel Plan</button>
                <button id="goAboutBtn" type="button">About</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>
        </div>

        <main class="search-layout search-layout-map">
            <div class="search-container">

                <!-- LEFT PANEL -->
                <div class="left-panel">
                    <h3>Select Bus:</h3>
                    <select id="busSelect"></select>

                    <h3>Filter Stations:</h3>
                    <input type="text" id="stationFilter" placeholder="Search stations...">

                    <h3>Available Stations</h3>
                    <div id="stationList" class="scroll-box"></div>
                </div>

                <!-- CENTER MAP -->
                <div class="map-panel">
                    <div id="map"></div>
                </div>

                <!-- RIGHT PANEL -->
                <div class="right-panel">
                    <h3>Selected Route Stops</h3>
                    <div id="selectedStops" class="scroll-box"></div>

                    <div class="route-buttons">
                        <button id="buildRouteBtn" type="button">Build Route</button>
                        <button id="clearRouteBtn" type="button">Clear Route</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="../js/pages/searchPage.js"></script>
</body>

</html>
