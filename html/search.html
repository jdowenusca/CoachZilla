<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Search Routes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <button id="about-btn">About</button>

    <div class="search-page-wrapper">

        <header class="search-header">
            <h1 class="logo-text">CoachZilla</h1>
        </header>

        <main class="search-layout">
            <h1>Search Routes</h1>

            <div class="search-actions">
                <button id="backHomeBtn">Home</button>
                <button id="goTravelBtn">Travel Plan</button>
                <button id="goAboutBtn">About</button>
                <button id="logoutBtn">Logout</button>
            </div>

            <input type="text" id="stationSearchInput" placeholder="Search stations by name">

            <h2>Available Stations</h2>
            <div id="stationsSearchList"></div>
        </main>
    </div>

    <script type="module" src="../js/pages/searchPage.js"></script>
</body>

</html>
