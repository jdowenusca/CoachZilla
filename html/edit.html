<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Edit Database</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="edit-page-wrapper">
        <header class="edit-header">
            <h1 class="logo-text">CoachZilla</h1>
        </header>

        <main class="edit-layout">
            <h1>Edit Data</h1>

            <div class="edit-actions">
                <button id="backToAdminBtn" type="button">Back to Admin</button>
                <button id="goAboutBtn" type="button">About</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>

            <section class="edit-grid">
                <div class="edit-column">

                    <h2 id="busFormTitle">Add Bus</h2>
                    <div class="form-section">
                        <input type="hidden" id="editingBusId">

                        <input type="text" id="busMake" placeholder="Make">
                        <input type="text" id="busModel" placeholder="Model">
                        <input type="text" id="busType" placeholder="Type">
                        <input type="text" id="busFuelType" placeholder="Fuel Type">
                        <input type="number" id="busFuelTankSize" placeholder="Fuel Tank Size">
                        <input type="number" id="busFuelBurnRate" placeholder="Fuel Burn Rate">
                        <input type="number" id="busCruiseSpeed" placeholder="Cruise Speed">

                        <div class="edit-form-actions">
                            <button id="saveBusBtn" type="button">Save Bus</button>
                            <button id="cancelBusEditBtn" type="button">Cancel Edit</button>
                        </div>
                    </div>

                    <h2 id="stationFormTitle">Add Station</h2>
                    <div class="form-section">
                        <input type="hidden" id="editingStationId">

                        <select id="stationMode">
                            <option value="bus">Bus Station</option>
                            <option value="refuel">Refuel Station</option>
                        </select>

                        <input type="text" id="stationName" placeholder="Station Name">
                        <input type="number" step="any" id="stationLatitude" placeholder="Latitude">
                        <input type="number" step="any" id="stationLongitude" placeholder="Longitude">
                        <input type="text" id="stationExtraField" placeholder="Station Type">

                        <div class="edit-form-actions">
                            <button id="saveStationBtn" type="button">Save Station</button>
                            <button id="cancelStationEditBtn" type="button">Cancel Edit</button>
                        </div>
                    </div>

                </div>

                <div class="edit-column">
                    <h2>Current Buses</h2>
                    <div id="editBusesList"></div>

                    <h2>Current Stations</h2>
                    <div id="editStationsList"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../js/pages/editPage.js"></script>
</body>
</html>
