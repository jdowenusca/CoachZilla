<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Edit Database</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="edit-page-wrapper">
        <header class="edit-header">
            <!-- Logo -->
            <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo">
            <h1>CoachZilla</h1>
        </header>

        <main class="edit-layout">
            <h1>Edit Data</h1>

            <div class="edit-actions">
                <button id="backToAdminBtn" type="button">Back to Admin</button>
                <button id="goAboutBtn" type="button">About</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>

            <section class="edit-grid">
                <div class="edit-column">

                    <h2 id="userFormTitle">Create New User</h2>
                    <div class="form-section">
                        <input type="hidden" id="editingUserId">

                        <input id="newUsername" type="text" placeholder="Username" maxlength="15" />
                        <input id="newPassword" type="password" placeholder="Password" />
                        <input id="newFirstName" type="text" placeholder="First Name" maxlength="15" />
                        <input id="newLastName" type="text" placeholder="Last Name" maxlength="15" />
                        <select id="newRole">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>

                    <div class="edit-form-actions">
                        <button id="saveUserBtn" type="button">Create User</button>
                        <button id="cancelUserEditBtn" type="button">Cancel Edit</button>
                     </div>
                </div>

                    <h2 id="busFormTitle">Add Bus</h2>
                    <div class="form-section">
                        <input type="hidden" id="editingBusId">

                        <select id="busMake">
                            <option value="" disabled selected>Select Make</option>
                            <option value="Ford">Ford</option>
                            <option value="Prevost">Prevost</option>
                        </select>
                        <input type="text" id="busModelText" placeholder="Model">
                        <select id="busModelSelect" hidden disabled>
                            <option value="" disabled selected>Select Ford Model</option>
                            <option value="Econoline E-450">Econoline E-450</option>
                            <option value="Econoline E-350">Econoline E-350</option>
                            <option value="Transit E-350">Transit E-350</option>
                        </select>
                        <select id="busType">
                            <option value="" disabled selected>Select Bus Type</option>
                            <option value="Shuttle">Shuttle</option>
                            <option value="Coach">Coach</option>
                        </select>
                        <select id="busFuelType">
                            <option value="" disabled selected>Select Fuel Type</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="Diesel">Diesel</option>
                        </select>
                        <input type="number" id="busFuelTankSize" placeholder="Fuel Tank Size (Gal)" min="10" max="300">
                        <input type="number" id="busFuelBurnRate" placeholder="Fuel Burn Rate (MPG)" min="1" max="50">
                        <input type="number" id="busCruiseSpeed" placeholder="Cruise Speed (MPH)" min="5" max="110">

                        <div class="edit-form-actions">
                            <button id="saveBusBtn" type="button">Save Bus</button>
                            <button id="cancelBusEditBtn" type="button">Cancel Edit</button>
                        </div>
                    </div>

                    <h2 id="stationFormTitle">Add Station</h2>
                    <div class="form-section">
                        <input type="hidden" id="editingStationId">

                        <select id="stationMode">
                            <option value="bus">Bus Station</option>
                            <option value="refuel">Refuel Station</option>
                        </select>

                        <input type="text" id="stationName" placeholder="Station Name">
                        <input type="number" step="any" id="stationLatitude" placeholder="Latitude (-90 to 90)" min="-90" max="90">
                        <input type="number" step="any" id="stationLongitude" placeholder="Longitude (-180 to 180)" min="-180" max="180">
                        <div class="edit-form-actions">
                            <button id="saveStationBtn" type="button">Save Station</button>
                            <button id="cancelStationEditBtn" type="button">Cancel Edit</button>
                        </div>
                    </div>

                </div>

                <div class="edit-column">
                    <h2>Current Users</h2>
                    <div id="editUsersList" class="scrollable-list"></div>

                    <h2>Current Buses</h2>
                    <div id="editBusesList" class="scrollable-list"></div>

                    <h2>Current Stations</h2>
                    <div id="editStationsList" class="scrollable-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../js/pages/editPage.js"></script>
</body>

</html>
