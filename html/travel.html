<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Travel Plan</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="travel-page-wrapper">
        <header class="travel-header">
            <!-- Logo -->
            <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo">
            <h1>CoachZilla</h1>
            <!-- Action buttons below logo -->
            <div class="travel-actions-container">
                <button id="backHomeBtn" type="button">Home</button>
                <button id="goSearchBtn" type="button">Search</button>
                <button id="goAboutBtn" type="button">About</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>
        </header>

        <main class="travel-layout">
            <section class="travel-main-grid">
                <div class="travel-column">
                    <h1>Travel Plan</h1>

                    <div id="travelPlanContainer"></div>

                    <div class="travel-status-controls">
                        <label for="statusSelect"><strong>Update Status</strong></label>
                        <select id="statusSelect">
                            <option value="planned">Planned</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>

                        <div class="travel-button-row">
                            <button id="updateStatusBtn" type="button">Update Status</button>
                            <button id="deletePlanBtn" type="button">Delete Plan</button>
                        </div>
                    </div>
                </div>

                <div class="travel-column">
                    <h2>Route Legs</h2>
                    <div id="routeLegsContainer" class="scrollable-route-legs"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../js/pages/travelPage.js"></script>
</body>

</html>
