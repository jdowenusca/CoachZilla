<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Travel Plan</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="travel-page-wrapper">

        <header class="travel-header">
            <h1 class="logo-text">CoachZilla</h1>
        </header>

        <main class="travel-layout">
            <h1>Travel Plan</h1>

            <div class="travel-actions">
                <button id="backHomeBtn">Home</button>
                <button id="goSearchBtn">Search Routes</button>
                <button id="goAboutBtn">About</button>
                <button id="logoutBtn">Logout</button>
            </div>

            <h2>Selected Stations</h2>
            <div id="travelPlanList"></div>

            <div class="travel-bottom-actions">
                <button id="clearTravelPlanBtn">Clear Travel Plan</button>
            </div>

        </main>
    </div>

    <script type="module" src="../js/pages/travelPage.js"></script>
</body>

</html>
