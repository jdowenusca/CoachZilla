<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Travel Plan</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="travel-page-wrapper">

        <header class="travel-header">
            <h1 class="logo-text">CoachZilla</h1>
        </header>

        <main class="travel-layout">
            <h1>Travel Plan</h1>

            <div id="travelPlanContainer"></div>

            <select id="statusSelect">
                <option value="planned">Planned</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>

            <button id="updateStatusBtn">Update Status</button>
            <button id="deletePlanBtn">Delete Plan</button>

        </main>
    </div>

    <script type="module" src="../js/pages/travelPage.js"></script>
</body>

</html>
