<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanA - Travel Plan</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <button class="about-btn" onclick="goToAbout()">About</button>

    <div class="travel-page-wrapper">

        <header class="travel-header">
            <h1 class="logo-text">PlanA</h1>
        </header>

        <main class="travel-layout">

            <section class="travel-main-panel">
                <h2>My Travel Plan</h2>
                <p class="travel-subtitle">Review the stops you have added to your current trip.</p>

                <div id="travelPlanList" class="travel-plan-list">
                    <!-- Travel plan items will be loaded here -->
                </div>
            </section>

            <aside class="travel-side-panel">
                <h2>Actions</h2>
                <button class="side-btn" onclick="goToSearch()">Back to Search</button>
                <button class="side-btn" onclick="goToMain()">Back to Main</button>
                <button class="side-btn danger-btn" onclick="clearTravelPlan()">Clear Travel Plan</button>

                <div class="mini-card">
                    <h3>Storage Type</h3>
                    <p>This page uses local browser storage.</p>
                    <p>No Firebase connection is needed for this prototype feature.</p>
                </div>
            </aside>

        </main>
    </div>

    <script type="module" src="../js/script.js"></script>
</body>
</html>
