<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoachZilla - Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-page-wrapper">
    <header class="admin-header">
      <!-- Logo -->
        <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo">
    </header>

    <main class="admin-layout">
      <section class="admin-top-actions">
        <button id="goEditBtn" type="button">Edit Database</button>
        <button id="goSearchBtn" type="button">Search Routes</button>
        <button id="goAboutBtn" type="button">About</button>
        <button id="logoutBtn" type="button">Logout</button>
      </section>

      <section id="adminWelcome"></section>

      <section>
        <h2>System Summary</h2>
        <div id="summaryCards" class="admin-summary-grid"></div>
      </section>

      <section class="admin-card form-section">
        <h2>Create New User</h2>
        <div class="form-group">
          <label for="newUsername">Username</label>
          <input id="newUsername" type="text" placeholder="Username" maxlength="15" />
        </div>
        <div class="form-group">
          <label for="newPassword">Password</label>
          <input id="newPassword" type="password" placeholder="Password" />
        </div>
        <div class="form-group">
          <label for="newFirstName">First Name</label>
          <input id="newFirstName" type="text" placeholder="First name" maxlength="15" />
        </div>
        <div class="form-group">
          <label for="newLastName">Last Name</label>
          <input id="newLastName" type="text" placeholder="Last name" maxlength="15" />
        </div>
        <div class="form-group">
          <label for="newRole">Role</label>
          <select id="newRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button id="createUserBtn" type="button">Create User</button>
      </section>

      <section class="admin-data-grid">
        <div>
          <h2>Recent Users</h2>
          <div id="recentUsersList"></div>
        </div>

        <div>
          <h2>Recent Buses</h2>
          <div id="recentBusesList"></div>
        </div>

        <div>
          <h2>Recent Stations</h2>
          <div id="recentStationsList"></div>
        </div>

        <div>
          <h2>Recent Travel Plans</h2>
          <div id="recentPlansList"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../js/pages/adminPage.js"></script>
</body>
</html>
