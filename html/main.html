<!-- Main dashboard page for route planning and station access. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachZilla - Main Page</title>
    <link rel="stylesheet" href="../css/style.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
</head>

<body>
    <div class="main-page-wrapper">
        <header class="main-header">
            <!--Logo-->
            <img src="../assets/images/logo.png" alt="CoachZilla Logo" class="logo-image">
            <h1 class="logo-text">CoachZilla</h1>
        </header>

        <main class="main-dashboard-card">
            <h2 class="main-welcome-title">Welcome to CoachZilla</h2>
            <p id="welcomeMessage"></p>

            <div class="main-actions">
                <button id="goSearchBtn" type="button">Search Routes</button>
                <button id="goTravelBtn" type="button">Travel Plan</button>
                <button id="goAboutBtn" type="button">About</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>

            <section class="main-map-section">
                <h3>Main Map View</h3>
                <p class="route-help-text">Focused on the University of South Carolina Aiken campus area.</p>
                <div id="mainMap"></div>
            </section>

            <section class="active-travel-plans-section">
                <h3>Active Travel Plans</h3>
                <div id="activeTravelPlansList" class="active-plans-list"></div>
            </section>
        </main>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script type="module" src="../js/pages/mainPage.js"></script>
</body>

</html>
